<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Album Player</title>
    <style>
        body { font-family: sans-serif; background: #0b0b0b; color: #eee; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; margin: 0; }
        
        .album-header { margin-bottom: 25px; text-align: center; }
        .cover-art { width: 320px; height: 320px; background: #1a1a1a; border-radius: 4px; object-fit: cover; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.7); }
        
        .player-container { margin-bottom: 40px; width: 100%; max-width: 450px; background: #1a1a1a; padding: 20px; border-radius: 8px; border: 1px solid #222; }
        #track-status { margin-bottom: 15px; font-size: 14px; color: #1DB954; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        audio { width: 100%; filter: invert(90%); }

        .tracklist { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); 
            gap: 10px; 
            max-width: 800px; 
            width: 100%; 
        }
        
        .song-btn { 
            background: #222; 
            color: #888; 
            border: 1px solid #333; 
            padding: 18px 5px; 
            border-radius: 3px; 
            cursor: pointer; 
            transition: 0.2s;
            font-size: 12px;
            font-weight: 600;
        }
        
        .song-btn:hover { background: #333; color: #fff; }
        .song-btn.active { background: #1DB954; color: #000; border-color: #1DB954; }
    </style>
</head>
<body>

    <div class="album-header">
        <img src="cover.jpg" alt="Album Cover" class="cover-art">
    </div>

    <div class="player-container">
        <div id="track-status">Select a Track</div>
        <audio id="main-player" controls preload="auto">
            Your browser does not support the audio element.
        </audio>
    </div>

    <div class="tracklist" id="button-grid">
        </div>

    <script>
        const player = document.getElementById('main-player');
        const statusDisplay = document.getElementById('track-status');
        const grid = document.getElementById('button-grid');

        // Build the 18 buttons
        for (let i = 1; i <= 18; i++) {
            const trackName = `Track #${i}`;
            const fileName = `Track #${i}.mp3`;

            const btn = document.createElement('button');
            btn.className = 'song-btn';
            btn.innerText = trackName;

            btn.onclick = function() {
                // 1. Highlight the current button
                document.querySelectorAll('.song-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');

                // 2. Format the URL to handle the '#' character correctly for web servers
                // We replace '#' with '%23' and ' ' with '%20'
                const encodedPath = fileName.replace(/#/g, '%23').replace(/ /g, '%20');
                
                statusDisplay.innerText = "Loading: " + trackName;
                
                // 3. Reset and Load
                player.pause();
                player.src = encodedPath;
                player.load();

                // 4. Play logic
                const playPromise = player.play();

                if (playPromise !== undefined) {
                    playPromise.then(() => {
                        statusDisplay.innerText = "Playing: " + trackName;
                    }).catch(error => {
                        console.error("Playback error:", error);
                        statusDisplay.innerText = "Error: File Not Found";
                    });
                }
            };

            grid.appendChild(btn);
        }

        // Auto-play next track logic
        player.onended = function() {
            const currentActive = document.querySelector('.song-btn.active');
            if (currentActive && currentActive.nextElementSibling) {
                currentActive.nextElementSibling.click();
            }
        };
    </script>

</body>
</html>
